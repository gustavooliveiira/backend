openapi: 3.1.1
info:
  title: Minha API
  description: Projeto de uma API REST desenvolvida com Expressjs
  version: 0.1.0
servers:
  - url: http://localhost:3000/
    description: Ambiente de Desenvolvimento
tags:
  - tarefas
paths:
  /tarefas:
    get:
      summary: Lista todas as tarefas
      tags:
        - tarefas
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArrayOfTarefa'
        500:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro500'
    post:
      summary: Cria uma nova tarefa
      tags:
        - tarefas
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  example: "Estudar Swagger"
      responses:
        201:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tarefa'
        422:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro422'
        500:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro500'
  /tarefas/id:
    get:
      summary: Busca uma tarefa pelo id
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tarefa'
        400:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro400'
        404:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro404'
        500:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro500'
    put:
      summary: Altera uma tarefa
      security:
        - JWTAuth: []
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                concluida:
                  type: boolean
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tarefa'
        400:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro400'
        404:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro404'
        422:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro422'
        500:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro500'
    delete:
      summary: Deleta uma tarefa
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      responses:
        204:
          content:
        400:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro400'
        404:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro404'
        500:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro500'
components:
  schemas:
    Tarefa:
      type: object
      properties:
        _id:
          type: string
        nome:
          type: string
        concluida:
          type: boolean
    ArrayOfTarefa:
      type: array
      items: 
        $ref: '#/components/schemas/Tarefa'
    Erro400:
      type: object
      properties:
        msg:
          type: string
          example: "Id inválido"
    Erro404:
      type: object
      properties:
        msg:
          type: string
          example: "Tarefa não encontrada"
    Erro422:
      type: object
      properties:
        msg:
          type: string
          example: "Nome obrigatório"
    Erro500:
      type: object
      properties:
        msg:
          type: string
          example: "Erro interno na API"
  securitySchemes:
    JWTAuth:
      type: apiKey
      in: header
      name: Authorization